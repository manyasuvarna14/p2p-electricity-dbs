<!DOCTYPE html>
<html>
<head>
  <title>P2P Energy</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="Email"><br>
  <input id="loginPassword" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>

  <h2>Signup</h2>
  <input id="signupName" placeholder="Name"><br>
  <input id="signupEmail" placeholder="Email"><br>
  <input id="signupPassword" type="password" placeholder="Password"><br>
  <select id="signupRole">
    <option value="buyer">Buyer</option>
    <option value="seller">Seller</option>
    <option value="prosumer">Prosumer</option>
  </select><br>
  <button onclick="signup()">Signup</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
  <h1>Dashboard</h1>

  <p>Energy Bought: <span id="bought"></span></p>
  <p>Energy Sold: <span id="sold"></span></p>
  <p>Wallet: <span id="wallet"></span></p>

  <button onclick="loadListings()">Load Listings</button>
  <button onclick="logout()">Logout</button>

  <h2>Listings</h2>
  <div id="listings"></div>

  <h2>Sell Energy</h2>
  <input id="sellUnits" placeholder="Units"><br>
  <input id="sellPrice" placeholder="Price"><br>
  <button onclick="sellEnergy()">Sell</button>
</div>

<script src="script.js"></script>
</body>
</html>
